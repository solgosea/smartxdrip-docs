site_name: SmartXDrip Docs
site_description: A planned companion review app for xDrip+ and Nightscout users.
site_url: https://solgosea.github.io/smartxdrip-docs/
repo_url: https://github.com/solgosea/smartxdrip-docs
copyright: Copyright &copy; 2026 SmartXDrip

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Lato
    code: Consolas
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Product Plan: product-plan.md
  - Planned Features:
      - planned-features/home.md
      - planned-features/history.md
      - planned-features/stats.md
  - FAQ: faq.md
  - Privacy: privacy.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
